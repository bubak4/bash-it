# Time-stamp: <2026-05-18 07:29:30 martin>

# ============================================================
# General behavior
# ============================================================
set -g status-keys emacs
set -g history-limit 100000
set -g bell-action none
set -g visual-bell off
set -sg escape-time 10
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY DBUS_SESSION_BUS_ADDRESS"

# ============================================================
# Terminal / titles
# ============================================================
set -g default-terminal "screen-256color"
set -g terminal-overrides 'xterm*:smcup@:rmcup@'   # use terminal's own scrollback
set -g set-titles on
set -g set-titles-string '#H:#S.#I.#P #W #T'       # host:session.window.pane program title
set -g focus-events on                             # forward focus events to emacs etc.

# ============================================================
# Windows / panes
# ============================================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on                         # no gaps when you close a window
set -g allow-rename off
set -g automatic-rename off
setw -g monitor-activity on

# ============================================================
# Status bar & visual feedback
# ============================================================
set -g status-interval 5
setw -g window-status-current-style bg=red
set -g pane-active-border-style 'fg=green'
set -g status-right '#{?client_prefix,#[bg=red#,fg=white#,bold] PREFIX ,}#{?pane_in_mode,#[bg=magenta#,fg=white#,bold] #{pane_mode} ,}#[default] %H:%M '

# flip the active pane border violet while in copy/view mode
set-hook -g pane-mode-changed 'set -Fg pane-active-border-style "#{?pane_in_mode,fg=brightmagenta#,bold,fg=green}"'

# ============================================================
# Key bindings  windows
# ============================================================
bind -n S-down  new-window
bind -n S-left  prev
bind -n S-right next
bind -n C-left  swap-window -t -1
bind -n C-right swap-window -t +1

# ============================================================
# Key bindings  utilities
# ============================================================
bind r source-file ~/.tmux.conf \; display "Reloaded"
bind h display-popup -E -w 80% -h 80% "htop"
bind m display-popup -E -w 80% -h 80% "mc"
bind e display-popup -E -w 80% -h 80% "emacsclient --nw"
bind c command-prompt -p "popup cmd:" "display-popup -E -w 80% -h 80% '%%'"
